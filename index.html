<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="site.title"></title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-orb hero-orb-a"></div>
    <div class="hero-orb hero-orb-b"></div>
    <nav class="nav container">
      <h1 class="brand" data-i18n="site.brand"></h1>
      <div class="controls">
        <button id="langToggle" class="btn btn-outline" type="button"></button>
        <button id="themeToggle" class="btn btn-outline" type="button"></button>
      </div>
    </nav>

    <section class="hero-content container">
      <img src="assets/photo.jpg" data-i18n-alt="hero.photoAlt" alt="" class="profile-image" />
      <div class="hero-main">
        <p class="eyebrow" data-i18n="hero.eyebrow"></p>
        <h2 data-i18n="hero.name"></h2>
        <p class="subtitle" data-i18n="hero.subtitle"></p>
        <p class="summary" data-i18n="hero.summary"></p>
        <div class="hero-actions">
          <a class="btn" href="#contactSection" data-i18n="hero.ctaPrimary"></a>
          <a class="btn btn-outline" href="https://ahaxxxx.github.io/Xenta-Field-CRM-Static-/" target="_blank" rel="noopener noreferrer" data-i18n="hero.ctaSecondary"></a>
        </div>
        <p class="hero-note" data-i18n="hero.crmNote"></p>
      </div>
    </section>

    <section class="container quick-facts reveal">
      <article class="fact-card">
        <p class="fact-value" data-i18n="facts.items.0.value"></p>
        <p class="fact-label" data-i18n="facts.items.0.label"></p>
      </article>
      <article class="fact-card">
        <p class="fact-value" data-i18n="facts.items.1.value"></p>
        <p class="fact-label" data-i18n="facts.items.1.label"></p>
      </article>
      <article class="fact-card">
        <p class="fact-value" data-i18n="facts.items.2.value"></p>
        <p class="fact-label" data-i18n="facts.items.2.label"></p>
      </article>
      <article class="fact-card">
        <p class="fact-value" data-i18n="facts.items.3.value"></p>
        <p class="fact-label" data-i18n="facts.items.3.label"></p>
      </article>
    </section>
  </header>

  <main>
    <section class="section container reveal">
      <h3 data-i18n="positioning.title"></h3>
      <p class="section-intro" data-i18n="positioning.intro"></p>
      <div class="grid three-col">
        <article class="card">
          <h4 data-i18n="positioning.items.0.title"></h4>
          <p data-i18n="positioning.items.0.desc"></p>
        </article>
        <article class="card">
          <h4 data-i18n="positioning.items.1.title"></h4>
          <p data-i18n="positioning.items.1.desc"></p>
        </article>
        <article class="card">
          <h4 data-i18n="positioning.items.2.title"></h4>
          <p data-i18n="positioning.items.2.desc"></p>
        </article>
      </div>
    </section>

    <section class="section section-alt reveal">
      <div class="container">
        <h3 data-i18n="rolefit.title"></h3>
        <p class="section-intro" data-i18n="rolefit.intro"></p>
        <div class="grid three-col">
          <article class="card project-card">
            <h4 data-i18n="rolefit.items.0.title"></h4>
            <p data-i18n="rolefit.items.0.desc"></p>
            <span class="tag" data-i18n="rolefit.items.0.tag"></span>
          </article>
          <article class="card project-card">
            <h4 data-i18n="rolefit.items.1.title"></h4>
            <p data-i18n="rolefit.items.1.desc"></p>
            <span class="tag" data-i18n="rolefit.items.1.tag"></span>
          </article>
          <article class="card project-card">
            <h4 data-i18n="rolefit.items.2.title"></h4>
            <p data-i18n="rolefit.items.2.desc"></p>
            <span class="tag" data-i18n="rolefit.items.2.tag"></span>
          </article>
        </div>
      </div>
    </section>

    <section class="section container reveal">
      <h3 data-i18n="proof.title"></h3>
      <p class="section-intro" data-i18n="proof.intro"></p>
      <div class="grid two-col">
        <article class="card">
          <h4 data-i18n="proof.items.0.title"></h4>
          <p data-i18n="proof.items.0.desc"></p>
          <span class="tag" data-i18n="proof.items.0.tag"></span>
        </article>
        <article class="card">
          <h4 data-i18n="proof.items.1.title"></h4>
          <p data-i18n="proof.items.1.desc"></p>
          <span class="tag" data-i18n="proof.items.1.tag"></span>
        </article>
        <article class="card">
          <h4 data-i18n="proof.items.2.title"></h4>
          <p data-i18n="proof.items.2.desc"></p>
          <span class="tag" data-i18n="proof.items.2.tag"></span>
        </article>
        <article class="card">
          <h4 data-i18n="proof.items.3.title"></h4>
          <p data-i18n="proof.items.3.desc"></p>
          <span class="tag" data-i18n="proof.items.3.tag"></span>
        </article>
      </div>
    </section>

    <section class="section container reveal">
      <h3 data-i18n="foundation.title"></h3>
      <div class="grid three-col">
        <article class="card">
          <h4 data-i18n="foundation.items.0.title"></h4>
          <p data-i18n="foundation.items.0.desc"></p>
        </article>
        <article class="card">
          <h4 data-i18n="foundation.items.1.title"></h4>
          <p data-i18n="foundation.items.1.desc"></p>
        </article>
        <article class="card">
          <h4 data-i18n="foundation.items.2.title"></h4>
          <p data-i18n="foundation.items.2.desc"></p>
        </article>
      </div>
    </section>

    <section class="section container reveal">
      <h3 data-i18n="awards.title"></h3>
      <p class="section-intro" data-i18n="awards.intro"></p>
      <div class="grid two-col">
        <article class="card">
          <h4 data-i18n="awards.master.title"></h4>
          <details class="awards-fold">
            <summary data-i18n="awards.master.foldTitle"></summary>
            <ul class="award-list award-list-locked">
              <li><span data-i18n="awards.master.items.0"></span></li>
              <li><span data-i18n="awards.master.items.1"></span></li>
              <li><span data-i18n="awards.master.items.2"></span></li>
              <li><span data-i18n="awards.master.items.3"></span></li>
              <li><span data-i18n="awards.master.items.4"></span></li>
              <li><span data-i18n="awards.master.items.5"></span></li>
            </ul>
          </details>
        </article>
        <article class="card">
          <h4 data-i18n="awards.undergrad.title"></h4>
          <details class="awards-fold">
            <summary data-i18n="awards.undergrad.foldTitle"></summary>
            <ul class="award-list award-list-locked">
              <li><span data-i18n="awards.undergrad.items.0"></span></li>
              <li><span data-i18n="awards.undergrad.items.1"></span></li>
              <li><span data-i18n="awards.undergrad.items.2"></span></li>
              <li><span data-i18n="awards.undergrad.items.3"></span></li>
              <li><span data-i18n="awards.undergrad.items.4"></span></li>
              <li><span data-i18n="awards.undergrad.items.5"></span></li>
              <li><span data-i18n="awards.undergrad.items.6"></span></li>
              <li><span data-i18n="awards.undergrad.items.7"></span></li>
              <li><span data-i18n="awards.undergrad.items.8"></span></li>
              <li><span data-i18n="awards.undergrad.items.9"></span></li>
            </ul>
          </details>
        </article>
      </div>
      <div class="awards-actions">
        <p class="section-intro" data-i18n="awards.privacyNote"></p>
        <a class="btn" href="#contactSection" data-i18n="awards.requestAccess"></a>
      </div>
    </section>

    <section class="section section-alt reveal">
      <div class="container">
        <h3 data-i18n="resumeHub.title"></h3>
        <p class="section-intro" data-i18n="resumeHub.intro"></p>
        <div class="grid two-col">
          <article class="card">
            <h4 data-i18n="resumeHub.en.title"></h4>
            <div class="resume-links">
              <a class="contact-item" href="resumes/CV_Renewable_Energy.pdf" target="_blank" rel="noopener noreferrer" data-i18n="resumeHub.en.items.0"></a>
              <a class="contact-item" href="resumes/CV_AI_Solutions.pdf" target="_blank" rel="noopener noreferrer" data-i18n="resumeHub.en.items.1"></a>
              <a class="contact-item" href="resumes/CV_International_Sales.pdf" target="_blank" rel="noopener noreferrer" data-i18n="resumeHub.en.items.2"></a>
            </div>
          </article>
          <article class="card">
            <h4 data-i18n="resumeHub.zh.title"></h4>
            <div class="resume-links">
              <a class="contact-item" href="resumes/CV_新能源国际销售.pdf" target="_blank" rel="noopener noreferrer" data-i18n="resumeHub.zh.items.0"></a>
              <a class="contact-item" href="resumes/CV_AI解决方案销售.pdf" target="_blank" rel="noopener noreferrer" data-i18n="resumeHub.zh.items.1"></a>
              <a class="contact-item" href="resumes/CV_国际销售.pdf" target="_blank" rel="noopener noreferrer" data-i18n="resumeHub.zh.items.2"></a>
            </div>
          </article>
        </div>
      </div>
    </section>

    <section id="contactSection" class="section container reveal">
      <h3 data-i18n="contact.title"></h3>
      <div id="contactLinks" class="contact-links"></div>
      <p id="copyFeedback" class="copy-feedback" aria-live="polite"></p>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-wrap">
      <p data-i18n="footer.languages"></p>
      <p>
        <span data-i18n="footer.locationPrefix"></span>
        <span data-i18n="footer.locationValue"></span>
      </p>
    </div>
  </footer>

  <script src="language.js"></script>
  <script src="theme.js"></script>
  <script src="contact.js"></script>
  <script src="script.js"></script>
</body>
</html>
